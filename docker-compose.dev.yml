services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sprint-sync-be:dev
    container_name: sprint-sync-api-dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_NAME=sprint-sync
      - DB_USER=sprintsync
      - DB_PASSWORD=sprintsync123
      - DB_AUTH_SOURCE=sprint-sync
      - DB_MIN_POOL_SIZE=2
      - DB_MAX_POOL_SIZE=5
      - APP_API_KEY=dev-api-key
      - JWT_ISSUER=sprint-sync
      - JWT_AUDIENCE=sprint-sync-users
      - JWT_ACCESS_TOKEN_VALIDITY=3600
      - JWT_REFRESH_TOKEN_VALIDITY=86400
      - JWT_SECRET=dev-secret-key-change-in-production
      - EXPRESS_LIMIT=10mb
      - PARAMETER_LIMIT=50000
      - OPENAI_KEY=${OPENAI_KEY:-}
      - CORS_URL=http://localhost:3001
      - LOG_DIR=logs
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sprint-sync-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: sprint-sync-db-dev
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=sprintsync
      - MONGO_INITDB_ROOT_PASSWORD=sprintsync123
      - MONGO_INITDB_DATABASE=sprint-sync
    volumes:
      - mongodb_data_dev:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - sprint-sync-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@localhost:27017/admin --eval \"quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mongodb_data_dev:
    driver: local

networks:
  sprint-sync-network:
    driver: bridge
